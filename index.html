<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic AI V34</title>
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    
    <style>
        :root {
            --bg: #131314;
            --sidebar: #1e1f20;
            --text: #e3e3e3;
            --input-bg: #1e1f20;
            --border: #444;
            --ai-bubble: transparent;
            --user-bubble: #2d2f31;
            --menu-hover: #37393b;
            --settings-bg: #2b2b2b;
            --accent: #b87cfc; /* Normal Purple */
        }

        /* Standard Layout */
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }

        #sidebar {
            width: 280px;
            background: var(--sidebar);
            display: none;
            flex-direction: column;
            border-right: 1px solid var(--border);
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .history-item:hover { background: var(--menu-hover); }
        .history-item.active { background: var(--user-bubble); border-left: 3px solid var(--accent); }

        .history-actions { display: none; gap: 8px; }
        .history-item:hover .history-actions { display: flex; }

        /* Normal Purple Ping (No Neon) */
        .notif-dot {
            width: 8px; height: 8px;
            background-color: var(--accent);
            border-radius: 50%;
            margin-left: 8px;
        }

        /* Animated Purple Dots */
        .typing-dots {
            display: flex;
            gap: 5px;
            padding: 10px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        #main { flex: 1; display: none; flex-direction: column; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px 15%; display: flex; flex-direction: column; gap: 15px; }

        .row { display: flex; gap: 12px; width: 100%; }
        .row.user { flex-direction: row-reverse; }
        .content { 
            max-width: 80%; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 15px;
            line-height: 1.5;
        }
        .user .content { background: var(--user-bubble); }
        .ai .content { background: var(--ai-bubble); }

        #input-container { padding: 20px 15%; }
        .input-box { 
            background: var(--input-bg); 
            border-radius: 25px; 
            padding: 10px 20px; 
            display: flex; 
            border: 1px solid var(--border); 
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; }
        #sendBtn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 20px; }
    </style>
</head>
<body id="app-body">

    <div id="login-overlay">
        <h1 style="color: white;">Cosmic AI V34</h1>
        <div id="g_id_onload" data-client_id="962541317340-h2tef7ghacll2okk8latem18qbsrs3hd.apps.googleusercontent.com" data-callback="unlockNow"></div>
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="sidebar">
        <div style="padding: 20px;">
            <div onclick="window.startNewChat()" style="background:var(--user-bubble); padding:12px; border-radius:10px; text-align:center; cursor:pointer;">+ New Chat</div>
        </div>
        <div id="history-list"></div>
    </div>

    <div id="main">
        <div id="chat-window"></div>
        <div id="input-container">
            <div id="status" style="font-size:12px; color:#666; margin-bottom:5px;">Ready</div>
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Message Cosmic AI..." disabled>
                <button id="sendBtn" onclick="window.ask()">➤</button>
            </div>
        </div>
    </div>

<script type="module">
    import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";
    
    let engine, isGenerating = false, currentId = null;
    let chats = JSON.parse(localStorage.getItem('my_ai_chats')) || {};

    window.unlockNow = () => { localStorage.setItem('cosmic_auth_success', 'true'); location.reload(); };
    if (localStorage.getItem('cosmic_auth_success') === 'true') {
        document.getElementById("login-overlay").style.display = "none";
        document.getElementById("sidebar").style.display = "flex";
        document.getElementById("main").style.display = "flex";
    }

    window.addEventListener('load', async () => {
        refreshSidebar();
        try {
            engine = await CreateMLCEngine("Llama-3.2-1B-Instruct-q4f16_1-MLC", {
                initProgressCallback: (p) => { document.getElementById("status").innerText = `Loading: ${Math.round(p.progress * 100)}%`; }
            });
            document.getElementById("status").innerText = "Ready";
            document.getElementById("userInput").disabled = false;
        } catch (e) { document.getElementById("status").innerText = "Error"; }
    });

    window.ask = async () => {
        const input = document.getElementById("userInput");
        let val = input.value.trim();
        if (!val || isGenerating) return;

        if (!currentId) window.startNewChat();
        let targetId = currentId;

        if (chats[targetId].title === "New Chat") chats[targetId].title = val.substring(0, 20);
        chats[targetId].history.push({ role: "user", content: val });
        input.value = "";
        window.render();
        isGenerating = true;

        const row = addRowUI("", "ai");
        const contentDiv = row.querySelector(".content");
        contentDiv.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;

        try {
            const chunks = await engine.chat.completions.create({
                messages: [{ role: "system", content: "You are Cosmic AI V34." }, ...chats[targetId].history],
                stream: true
            });

            let fullStr = "";
            for await (const chunk of chunks) {
                fullStr += chunk.choices[0]?.delta?.content || "";
                if (currentId === targetId) {
                    contentDiv.innerHTML = marked.parse(fullStr);
                    contentDiv.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
                }
            }
            chats[targetId].history.push({ role: "assistant", content: fullStr });
            chats[targetId].hasNotif = (currentId !== targetId);
            save();
        } finally { isGenerating = false; window.render(); }
    };

    window.startNewChat = () => {
        currentId = Date.now().toString();
        chats[currentId] = { title: "New Chat", history: [], hasNotif: false };
        save(); window.render();
    };

    window.selectChat = (id) => {
        currentId = id;
        if(chats[id]) chats[id].hasNotif = false;
        save(); window.render();
    };

    window.renameChat = (id, e) => {
        e.stopPropagation();
        const n = prompt("New Name:", chats[id].title);
        if(n) { chats[id].title = n; save(); refreshSidebar(); }
    };

    window.deleteChat = (id, e) => {
        e.stopPropagation();
        if(confirm("Delete chat?")) {
            delete chats[id];
            if(currentId === id) currentId = null;
            save(); window.render();
        }
    };

    function addRowUI(text, type) {
        const row = document.createElement("div");
        row.className = `row ${type}`;
        row.innerHTML = `<div class="content"></div>`;
        const c = row.querySelector(".content");
        if (type === 'ai') c.innerHTML = marked.parse(text || '');
        else c.innerText = text;
        document.getElementById("chat-window").appendChild(row);
        return row;
    }

    function save() { localStorage.setItem('my_ai_chats', JSON.stringify(chats)); refreshSidebar(); }

    function refreshSidebar() {
        const list = document.getElementById("history-list");
        list.innerHTML = "";
        Object.keys(chats).sort((a,b) => b-a).forEach(id => {
            const item = document.createElement("div");
            item.className = `history-item ${id === currentId ? 'active' : ''}`;
            item.onclick = () => window.selectChat(id);
            item.innerHTML = `
                <span>${chats[id].title} ${chats[id].hasNotif ? '<span class="notif-dot"></span>' : ''}</span>
                <div class="history-actions">
                    <button onclick="window.renameChat('${id}', event)" style="background:none; border:none; color:white; cursor:pointer;">✏️</button>
                    <button onclick="window.deleteChat('${id}', event)" style="background:none; border:none; color:white; cursor:pointer;">🗑️</button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    window.render = () => {
        const win = document.getElementById("chat-window");
        win.innerHTML = "";
        if (currentId && chats[currentId]) {
            chats[currentId].history.forEach(m => addRowUI(m.content, m.role === 'user' ? 'user' : 'ai'));
        }
        win.scrollTop = win.scrollHeight;
    };

    document.getElementById("userInput").addEventListener("keypress", (e) => { if(e.key === "Enter") window.ask(); });
</script>
</body>
</html>
